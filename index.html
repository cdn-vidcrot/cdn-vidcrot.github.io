<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title akan diubah secara dinamis oleh JavaScript -->
    <title>Loading...</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        video {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>
    <video
        id="video"
        controls
        playsinline
        autoplay="false"
        controlsList="nodownload noplaybackrate">
    </video>

    <script>
        // Ambil ID dari URL (?id=xxx)
        const params = new URLSearchParams(window.location.search);
        const VIDEO_ID = params.get("id") || "";

        // Set title sesuai ID (jika ada ID)
        if (VIDEO_ID) {
            document.title = VIDEO_ID + ".mp4";
        } else {
            document.title = "No ID Provided";
        }

        const video = document.getElementById("video");
        const baseUrl = "https://cdn.videy.co/";  // atau https://cdn.videy.co/ kalau pakai yang itu

        function loadVideo(ext = ".mp4") {
            if (!VIDEO_ID) {
                document.body.innerHTML = `<p style="color:#fff; text-align:center; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:20px;">Gunakan format: ?id=VIDEO_ID</p>`;
                return;
            }
            video.src = baseUrl + VIDEO_ID + ext;
            video.load();
        }

        // Load pertama
        loadVideo(".mp4");

        // Fallback ke .mov kalau mp4 error
        video.onerror = () => {
            if (!video.dataset.tried) {
                video.dataset.tried = "1";
                loadVideo(".mov");
            } else {
                video.innerHTML = ``;
            }
        };
    </script>
